<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sala Privada</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root {
            --fondo: #0a0f16;
            --panel: #131c27;
            --primario: #00e676; /* Verde Vivo */
            --primario-hover: #00c853;
            --peligro: #ff1744;
            --texto: #ffffff;
            --radio: 12px;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--fondo);
            color: var(--texto);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- LOBBY --- */
        #pantallaLobby {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
        }

        .tarjeta-lobby {
            background: var(--panel);
            padding: 30px;
            border-radius: var(--radio);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 700px;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .lobby-video-preview {
            flex: 1;
            min-width: 250px;
            position: relative;
            border-radius: var(--radio);
            overflow: hidden;
            background: #000;
            aspect-ratio: 16/9;
            border: 1px solid #2a3b4c;
        }

        .lobby-controles {
            flex: 1;
            min-width: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
        }

        .input-text, .select-dispositivo {
            background: rgba(0,0,0,0.4);
            border: 1px solid #2a3b4c;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-text:focus, .select-dispositivo:focus { border-color: var(--primario); }

        .perfil-preview {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #2a3b4c;
        }

        .mini-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primario);
            background: #131c27;
        }

        /* --- LLAMADA Y GRID AUTOMÁTICO --- */
        #pantallaLlamada {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .grid-videos {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            padding: 20px;
            align-content: center;
            justify-items: center;
            overflow-y: auto;
        }

        .video-container {
            position: relative;
            background: var(--panel);
            border-radius: var(--radio);
            overflow: hidden;
            width: 100%;
            max-width: 700px; 
            aspect-ratio: 16/9;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            border: 2px solid transparent;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-container.hablando {
            border-color: var(--primario);
            box-shadow: 0 0 25px rgba(0, 230, 118, 0.3);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            transition: opacity 0.3s ease;
            position: absolute;
        }

        .avatar-container {
            position: relative;
            width: 100px;
            height: 100px;
            display: none;
            z-index: 10;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: contain; 
            border: 2px solid var(--primario);
            background: #131c27;
            position: relative;
            z-index: 2;
        }

        .onda {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 230, 118, 0.4);
            border-radius: 50%;
            z-index: 1;
            opacity: 0;
        }

        .hablando-avatar .onda { animation: latido 1.2s infinite ease-out; }
        @keyframes latido { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.6); opacity: 0; } }

        .etiqueta-nombre {
            position: absolute;
            bottom: 12px; left: 12px;
            background: rgba(0,0,0,0.7);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            z-index: 20;
            letter-spacing: 0.5px;
        }

        /* --- NUEVOS CONTROLES INFERIORES (DISEÑO LIMPIO) --- */
        .barra-inferior {
            background: var(--panel);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between; /* Separa los grupos en PC */
            align-items: center;
            border-top: 1px solid #2a3b4c;
            z-index: 30;
        }

        .grupo-selectores {
            display: flex;
            gap: 10px;
            flex: 1;
        }

        .grupo-botones {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex: 2;
        }

        .espaciador-vacio {
            flex: 1; /* Para centrar los botones perfectamente en PC */
        }

        button {
            background: var(--primario);
            color: #000000;
            border: none;
            padding: 12px 24px;
            border-radius: 30px; /* Forma de píldora redonda y suave */
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap; /* Evita que el texto se parta en dos líneas */
        }

        button:hover { background: var(--primario-hover); transform: translateY(-2px); }
        button.secundario { background: #2a3b4c; color: #ffffff; }
        button.secundario:hover { background: #3d536b; }
        button.apagado { background: #2a3b4c; color: #ffffff; border: 1px solid #4a5c6e; }
        button.salir { background: var(--peligro); color: white; }
        button.salir:hover { background: #d50000; }

        /* --- RESPONSIVE PARA CELULARES --- */
        @media (max-width: 768px) {
            .barra-inferior { 
                flex-direction: column; 
                padding: 12px; 
                gap: 12px;
            }
            .espaciador-vacio { display: none; }
            
            .grupo-selectores { 
                width: 100%; 
                justify-content: space-between; 
            }
            .select-dispositivo { 
                width: 48%; /* Los selectores caben en una sola fila arriba */
                font-size: 12px; 
                padding: 8px; 
            }
            
            .grupo-botones { 
                width: 100%; 
                justify-content: space-between; 
                gap: 5px; 
            }
            button { 
                width: 32%; /* Los 3 botones caben en una sola fila abajo */
                padding: 12px 0; 
                font-size: 11px; /* Texto un poco más pequeño para que encaje */
                border-radius: 12px;
                text-align: center;
            }
            
            .grid-videos { padding: 10px; }
            .video-container { border-radius: 8px; }
        }
    </style>
</head>
<body>

    <div id="pantallaLobby">
        <h2 style="margin-bottom: 20px; color: var(--primario); font-weight: 400;">Configuracion de Sala</h2>
        <div class="tarjeta-lobby">
            <div class="lobby-video-preview">
                <video id="videoPreview" autoplay playsinline muted></video>
                <div class="etiqueta-nombre" id="previewNombre">Tú</div>
            </div>
            <div class="lobby-controles">
                <input type="text" id="inputNombre" class="input-text" placeholder="Escribe tu nombre" autocomplete="off">
                <div class="perfil-preview">
                    <img id="miniAvatar" class="mini-avatar" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=">
                    <div style="flex: 1;">
                        <span style="font-size: 12px; color: #88929e;">Foto de Perfil</span><br>
                        <input type="file" id="inputFoto" accept="image/*" style="display: none;">
                        <button onclick="document.getElementById('inputFoto').click()" class="secundario" style="padding: 5px 10px; margin-top: 5px; font-size: 11px; width: auto;">Cambiar Imagen</button>
                    </div>
                </div>
                <select id="selectMicLobby" class="select-dispositivo"></select>
                <select id="selectCamLobby" class="select-dispositivo"></select>
                <button id="btnUnirse" style="width: 100%; margin-top: 10px; padding: 14px;">Conectar</button>
            </div>
        </div>
    </div>

    <div id="pantallaLlamada">
        <div id="contenedorParticipantes" class="grid-videos"></div>
        
        <div class="barra-inferior">
            <div class="grupo-selectores">
                <select id="selectMicLlamada" class="select-dispositivo"></select>
                <select id="selectCamLlamada" class="select-dispositivo"></select>
            </div>
            
            <div class="grupo-botones">
                <button id="btnSilenciar">Microfono</button>
                <button id="btnApagarCam">Camara</button>
                <button id="btnSalir" class="salir">Salir</button>
            </div>
            
            <div class="espaciador-vacio"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
